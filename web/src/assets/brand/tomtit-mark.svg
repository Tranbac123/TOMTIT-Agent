  <rect x="12" y="13" width="48" height="14" rx="7" fill="#e85a1b"/>
  <!-- Segment dividers -->
  <path d="M26 13V27M36 13V27M46 13V27" stroke="#c04010" stroke-width="0.8" opacity="0.4"/>
