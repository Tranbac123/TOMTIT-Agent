  <circle cx="10" cy="18" r="2.5" fill="#e8f5f2"/>
  <circle cx="10.5" cy="18" r="1.1" fill="#0a1a14"/>
  <!-- Antennae -->
  <path d="M9 15L5 9M12 14L10 8" stroke="#e85a1b" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Tail fan -->
  <path d="M57 17L66 13M58 20L67 20M57 23L66 27" stroke="#e85a1b" stroke-width="2" stroke-linecap="round"/>
  <!-- Swimmerets -->
  <path d="M20 27L18 32M30 27L28 32M40 27L38 32M50 27L48 32" stroke="#c04010" stroke-width="1.1" stroke-linecap="round" opacity="0.5"/>
